<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Art Guesser</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #f5f0e8;
    --ink: #1a1510;
    --gold: #c9a84c;
    --rust: #8b3a2a;
    --muted: #7a6e5f;
    --card: #fffdf7;
    --border: #d9cfc0;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--cream);
    color: var(--ink);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  header {
    width: 100%;
    padding: 1.25rem 1rem 0.75rem;
    text-align: center;
    border-bottom: 1px solid var(--border);
  }

  .logo { font-family: 'Playfair Display', serif; font-size: clamp(1.6rem, 6vw, 2.8rem); letter-spacing: -0.02em; }
  .logo span { color: var(--gold); font-style: italic; }

  .tagline { font-size: 0.7rem; color: var(--muted); letter-spacing: 0.15em; text-transform: uppercase; margin-top: 0.15rem; }

  .score-bar { display: flex; gap: 1.25rem; justify-content: center; margin-top: 0.6rem; font-size: 0.75rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); }
  .score-bar strong { color: var(--ink); font-family: 'Playfair Display', serif; font-size: 1rem; }

  .header-top {
    width: 100%;
    max-width: 680px;
    margin: 0 auto;
    display: flex;
    justify-content: flex-end;
    margin-bottom: 0.6rem;
  }

  .lang-btn {
    background: transparent;
    border: 1.5px solid var(--border);
    border-radius: 999px;
    padding: 0.45rem 0.9rem;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.78rem;
    color: var(--muted);
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  .lang-btn:hover {
    border-color: var(--gold);
    color: var(--ink);
  }

  main { width: 100%; max-width: 680px; padding: 1.5rem 1rem 3rem; }

  #loading { display: flex; flex-direction: column; align-items: center; gap: 1rem; padding: 4rem 0; }

  .spinner { width: 32px; height: 32px; border: 2px solid var(--border); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.9s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text { font-size: 0.8rem; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; text-align: center; }

  .progress { display: flex; gap: 5px; margin-bottom: 1rem; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--border); transition: background 0.3s; }
  .dot.done { background: var(--gold); }
  .dot.current { background: var(--ink); }

  .round-label { font-size: 0.7rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.75rem; }

  .painting-frame {
    background: var(--ink);
    padding: 8px;
    border-radius: 2px;
    box-shadow: 6px 6px 0 var(--border);
    margin-bottom: 1.25rem;
    min-height: 180px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  .painting-frame img {
    width: 100%;
    max-height: 340px;
    object-fit: contain;
    display: block;
    background: #111;
    transition: opacity 0.4s;
  }

  .img-loader { position: absolute; display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .img-loader span { font-size: 11px; color: #888; letter-spacing: 0.1em; text-transform: uppercase; }

  .question { font-family: 'Playfair Display', serif; font-size: clamp(1rem, 3.5vw, 1.25rem); margin-bottom: 1rem; line-height: 1.4; transition: opacity 0.3s; }

  .options { display: grid; grid-template-columns: 1fr; gap: 0.6rem; margin-bottom: 1.25rem; transition: opacity 0.3s; }
  @media (min-width: 500px) { .options { grid-template-columns: 1fr 1fr; } }

  .option-btn {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 2px;
    padding: 0.85rem 1rem;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.88rem;
    color: var(--ink);
    cursor: pointer;
    text-align: left;
    line-height: 1.4;
    -webkit-tap-highlight-color: transparent;
    transition: border-color 0.15s, background 0.15s;
  }

  .option-btn:active:not(:disabled) { background: #fffbf0; }
  @media (hover: hover) { .option-btn:hover:not(:disabled) { border-color: var(--gold); background: #fffbf0; } }
  .option-btn.correct { background: #f0f7ec; border-color: #5a8a4a; color: #2d5a1e; }
  .option-btn.wrong { background: #fdf0ee; border-color: var(--rust); color: var(--rust); }
  .option-btn:disabled { cursor: default; }

  .feedback { font-family: 'Playfair Display', serif; font-size: 0.95rem; font-style: italic; margin-bottom: 1rem; min-height: 1.4rem; color: var(--muted); }
  .feedback.correct { color: #3d6b2e; }
  .feedback.wrong { color: var(--rust); }

  .hint-box {
    background: var(--card);
    border-left: 3px solid var(--gold);
    padding: 0.75rem 1rem;
    font-size: 0.82rem;
    color: var(--muted);
    line-height: 1.6;
    margin-bottom: 1rem;
    display: none;
    max-height: 110px;
    overflow-y: auto;
  }

  .bottom-row { display: flex; gap: 0.6rem; align-items: center; flex-wrap: wrap; }

  .next-btn {
    background: var(--ink);
    color: var(--cream);
    border: none;
    border-radius: 2px;
    padding: 0.75rem 1.75rem;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.88rem;
    cursor: pointer;
    display: none;
    -webkit-tap-highlight-color: transparent;
  }

  .hint-btn {
    background: transparent;
    border: 1.5px solid var(--border);
    border-radius: 2px;
    padding: 0.75rem 1rem;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.82rem;
    color: var(--muted);
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  #endscreen { display: none; text-align: center; padding: 2.5rem 1rem; }
  .final-score { font-family: 'Playfair Display', serif; font-size: clamp(3rem, 15vw, 5.5rem); color: var(--gold); line-height: 1; margin-bottom: 0.4rem; }
  .final-label { font-size: 0.75rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); margin-bottom: 1.25rem; }
  .final-msg { font-family: 'Playfair Display', serif; font-size: 1.15rem; font-style: italic; margin-bottom: 1.75rem; }
  .restart-btn { background: var(--ink); color: var(--cream); border: none; border-radius: 2px; padding: 0.85rem 2.25rem; font-family: 'DM Sans', sans-serif; font-size: 0.9rem; cursor: pointer; }

  #game { display: none; }
  #error-msg { display: none; text-align: center; padding: 3rem; color: var(--rust); font-family: 'Playfair Display', serif; font-style: italic; }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <button class="lang-btn" id="lang-toggle" onclick="toggleLanguage()">NL / EN</button>
  </div>
  <div class="logo">Art <span>Guesser</span></div>
  <div class="tagline" id="tagline">Ken jij de grote meesters?</div>
  <div class="score-bar">
    <div><span id="score-label">Score</span> <strong id="score-display">0</strong></div>
    <div><span id="round-text-label">Ronde</span> <strong id="round-display">0</strong> / <strong id="total-display">10</strong></div>
  </div>
</header>

<main>
  <div id="loading">
    <div class="spinner"></div>
    <div class="loading-text" id="loading-text">Data laden...</div>
  </div>

  <div id="game">
    <div class="round-label" id="round-label">Vraag 1 van 10</div>
    <div class="progress" id="progress"></div>

    <div class="painting-frame">
      <div class="img-loader" id="img-loader">
        <div class="spinner"></div>
        <span>Laden...</span>
      </div>
      <img id="painting-img" src="" alt="Schilderij" referrerpolicy="no-referrer" style="opacity:0;" />
    </div>

    <div class="question" id="question" style="opacity:0;"></div>
    <div class="options" id="options" style="opacity:0;"></div>
    <div class="feedback" id="feedback"></div>
    <div class="hint-box" id="hint-box"></div>
    <div class="bottom-row">
      <button class="next-btn" id="next-btn" onclick="nextRound()">Volgende →</button>
    </div>
  </div>

  <div id="endscreen">
    <div class="final-score" id="final-score"></div>
    <div class="final-label" id="final-label">punten behaald</div>
    <div class="final-msg" id="final-msg"></div>
    <button class="restart-btn" id="restart-btn" onclick="startGame()">Opnieuw spelen</button>
  </div>

  <div id="error-msg">Kon data.json niet laden. Controleer of het bestand in dezelfde map staat als index.html en probeer opnieuw.</div>
</main>

<script>
const ROUNDS = 10;
const DATA_URL = './data.json';

const translations = {
  nl: {
    htmlLang: 'nl',
    tagline: 'Ken jij de grote meesters?',
    scoreLabel: 'Score',
    roundLabel: 'Ronde',
    loadingData: 'Data laden...',
    loadingPainting: 'Schilderij laden...',
    imgLoading: 'Laden...',
    roundText: (current, total) => `Vraag ${current} van ${total}`,
    askArtist: 'Wie is de schilder van dit werk?',
    askTitle: 'Hoe heet dit schilderij?',
    correct: 'Correct!',
    wrong: answer => `Niet juist, het was: ${answer}`,
    finalLabel: 'punten behaald',
    restart: 'Opnieuw spelen',
    error: 'Kon data.json niet laden. Controleer of het bestand in dezelfde map staat als index.html en probeer opnieuw.',
    endMessages: {
      master: 'Meesterlijk! Je kent je kunst.',
      impressive: 'Indrukwekkend! Je hebt een scherp oog.',
      decent: 'Niet slecht! Nog wat oefenen?',
      start: 'Een begin is er. Musea wachten op je!',
      everyone: 'Kunst is voor iedereen, ook voor jou!'
    }
  },
  en: {
    htmlLang: 'en',
    tagline: 'Do you know the great masters?',
    scoreLabel: 'Score',
    roundLabel: 'Round',
    loadingData: 'Loading data...',
    loadingPainting: 'Loading painting...',
    imgLoading: 'Loading...',
    roundText: (current, total) => `Question ${current} of ${total}`,
    askArtist: 'Who painted this work?',
    askTitle: 'What is the name of this painting?',
    correct: 'Correct!',
    wrong: answer => `Not correct, it was: ${answer}`,
    finalLabel: 'points scored',
    restart: 'Play again',
    error: 'Could not load data.json. Check whether the file is in the same folder as index.html and try again.',
    endMessages: {
      master: 'Masterful! You really know your art.',
      impressive: 'Impressive! You have a sharp eye.',
      decent: 'Not bad. A little more practice?',
      start: 'A good start. The museums are waiting for you!',
      everyone: 'Art is for everyone, including you!'
    }
  }
};

let currentLanguage = 'nl';

let allPaintings = [];
let pool = [];
let current = 0;
let score = 0;
let answered = false;
let currentItem = null;

async function loadData() {
  const res = await fetch(DATA_URL, { cache: 'no-store' });
  if (!res.ok) {
    throw new Error(`Kon ${DATA_URL} niet laden (${res.status})`);
  }

  const data = await res.json();

  if (!Array.isArray(data) || data.length === 0) {
    throw new Error('data.json bevat geen geldige lijst met schilderijen.');
  }

  const cleaned = data.filter(item => (
    item &&
    typeof item.title === 'string' && item.title.trim() &&
    typeof item.artist === 'string' && item.artist.trim() &&
    typeof item.image === 'string' && item.image.trim()
  ));

  if (cleaned.length < 4) {
    throw new Error('Er zijn te weinig geldige schilderijen voor een quiz.');
  }

  return cleaned;
}

function shuffle(array) {
  const copy = [...array];
  for (let i = copy.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [copy[i], copy[j]] = [copy[j], copy[i]];
  }
  return copy;
}

function t() {
  return translations[currentLanguage];
}

function updateStaticTexts() {
  const lang = t();
  document.documentElement.lang = lang.htmlLang;
  document.getElementById('tagline').textContent = lang.tagline;
  document.getElementById('score-label').textContent = lang.scoreLabel;
  document.getElementById('round-text-label').textContent = lang.roundLabel;
  document.getElementById('final-label').textContent = lang.finalLabel;
  document.getElementById('restart-btn').textContent = lang.restart;
  document.getElementById('error-msg').textContent = lang.error;

  const imgLoaderText = document.querySelector('#img-loader span');
  if (imgLoaderText) imgLoaderText.textContent = lang.imgLoading;
}

function refreshVisibleTexts() {
  updateStaticTexts();

  if (document.getElementById('loading').style.display !== 'none') {
    const loadingText = document.getElementById('loading-text').textContent;
    if (loadingText.includes('data') || loadingText.includes('Data')) {
      document.getElementById('loading-text').textContent = t().loadingData;
    } else {
      document.getElementById('loading-text').textContent = t().loadingPainting;
    }
  }

  if (document.getElementById('game').style.display !== 'none' && currentItem) {
    const askArtist = current % 2 === 0;
    document.getElementById('round-label').textContent = t().roundText(current + 1, ROUNDS);
    document.getElementById('question').textContent = askArtist ? t().askArtist : t().askTitle;

    const hintBox = document.getElementById('hint-box');
    if (hintBox.style.display !== 'none') {
      hintBox.textContent = getHintText(currentItem);
    }
  }

  if (document.getElementById('endscreen').style.display !== 'none') {
    const pct = score / (ROUNDS * 2);
    const messages = t().endMessages;
    const msg = pct >= 0.9 ? messages.master
      : pct >= 0.7 ? messages.impressive
      : pct >= 0.5 ? messages.decent
      : pct >= 0.3 ? messages.start
      : messages.everyone;
    document.getElementById('final-msg').textContent = msg;
  }
}

function toggleLanguage() {
  currentLanguage = currentLanguage === 'nl' ? 'en' : 'nl';
  refreshVisibleTexts();
}

function preloadImage(src) {
  if (!src) return;
  const img = new Image();
  img.src = src;
}

function getHintText(item) {
  if (!item) return '';

  if (currentLanguage === 'en') {
    const parts = [];
    const title = item.title || 'Unknown work';
    const artist = item.artist || 'unknown artist';
    const date = item.date ? `, ${item.date}` : '';
    parts.push(`${title} is a painting by ${artist}${date}.`);
    if (item.style) {
      parts.push(`Style: ${item.style}.`);
    }
    return parts.join(' ');
  }

  if (item.extract?.trim()) return item.extract.trim();

  const title = item.title || 'Onbekend werk';
  const artist = item.artist || 'onbekende kunstenaar';
  const date = item.date ? ` uit ${item.date}` : '';
  const style = item.style ? ` Stijl: ${item.style}.` : '';
  return `${title} is een schilderij van ${artist}${date}.${style}`;
}

function getUniqueWrongArtistOptions(correctItem) {
  const used = new Set([correctItem.artist]);
  const options = [];

  for (const item of shuffle(allPaintings)) {
    if (item.title === correctItem.title) continue;
    if (used.has(item.artist)) continue;
    used.add(item.artist);
    options.push(item.artist);
    if (options.length === 3) break;
  }

  return options;
}

function getUniqueWrongTitleOptions(correctItem) {
  const used = new Set([correctItem.title]);
  const options = [];

  for (const item of shuffle(allPaintings)) {
    if (item.title === correctItem.title) continue;
    if (used.has(item.title)) continue;
    used.add(item.title);
    options.push(item.title);
    if (options.length === 3) break;
  }

  return options;
}

async function startGame() {
  updateStaticTexts();
  score = 0;
  current = 0;
  answered = false;
  currentItem = null;

  document.getElementById('score-display').textContent = '0';
  document.getElementById('round-display').textContent = '1';
  document.getElementById('total-display').textContent = ROUNDS;
  document.getElementById('endscreen').style.display = 'none';
  document.getElementById('error-msg').style.display = 'none';
  document.getElementById('game').style.display = 'none';
  document.getElementById('loading').style.display = 'flex';
  document.getElementById('loading-text').textContent = t().loadingData;

  try {
    if (allPaintings.length === 0) {
      allPaintings = await loadData();
    }

    pool = shuffle(allPaintings).slice(0, Math.min(ROUNDS, allPaintings.length));

    buildProgress();
    await loadNextRound();
  } catch (error) {
    console.error(error);
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error-msg').style.display = 'block';
  }
}

async function loadNextRound() {
  document.getElementById('game').style.display = 'none';
  document.getElementById('loading').style.display = 'flex';
  document.getElementById('loading-text').textContent = t().loadingPainting;

  const item = pool[current];

  if (!item) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error-msg').style.display = 'block';
    return;
  }

  currentItem = item;

  const nextItem = pool[current + 1];
  if (nextItem?.image) {
    preloadImage(nextItem.image);
  }

  showRound(item);
}

function buildProgress() {
  const el = document.getElementById('progress');
  el.innerHTML = '';
  for (let i = 0; i < ROUNDS; i++) {
    const dot = document.createElement('div');
    dot.className = 'dot' + (i === 0 ? ' current' : '');
    dot.id = `dot-${i}`;
    el.appendChild(dot);
  }
}

function updateProgress() {
  for (let i = 0; i < ROUNDS; i++) {
    const dot = document.getElementById(`dot-${i}`);
    if (!dot) continue;
    dot.className = 'dot' + (i < current ? ' done' : i === current ? ' current' : '');
  }
}

function showRound(item) {
  answered = false;

  document.getElementById('loading').style.display = 'none';
  document.getElementById('game').style.display = 'block';
  document.getElementById('round-label').textContent = t().roundText(current + 1, ROUNDS);
  document.getElementById('round-display').textContent = current + 1;
  document.getElementById('feedback').textContent = '';
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('hint-box').style.display = 'none';
  document.getElementById('hint-box').textContent = '';
  document.getElementById('next-btn').style.display = 'none';

  const img = document.getElementById('painting-img');
  const loader = document.getElementById('img-loader');
  img.style.opacity = '0';
  document.getElementById('question').style.opacity = '0';
  document.getElementById('options').style.opacity = '0';
  loader.style.display = 'flex';

  const askArtist = current % 2 === 0;
  document.getElementById('question').textContent = askArtist
    ? t().askArtist
    : t().askTitle;

  const wrongOptions = askArtist
    ? getUniqueWrongArtistOptions(item)
    : getUniqueWrongTitleOptions(item);

  const correctAnswer = askArtist ? item.artist : item.title;
  const choices = shuffle([correctAnswer, ...wrongOptions]);

  const container = document.getElementById('options');
  container.innerHTML = '';

  choices.forEach(choice => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.textContent = choice;
    btn.onclick = () => handleAnswer(btn, choice === correctAnswer, correctAnswer);
    container.appendChild(btn);
  });

  updateProgress();

  const revealRound = () => {
    loader.style.display = 'none';
    img.style.opacity = '1';
    document.getElementById('question').style.opacity = '1';
    document.getElementById('options').style.opacity = '1';
  };

  const preloader = new Image();
  preloader.onload = () => {
    img.src = item.image;
    revealRound();
  };

  preloader.onerror = () => {
    img.src = item.image;
    revealRound();
  };

  img.src = '';
  preloader.src = item.image;
}

function handleAnswer(btn, isCorrect, correctAnswer) {
  if (answered) return;
  answered = true;

  document.querySelectorAll('.option-btn').forEach(b => {
    b.disabled = true;
    if (b.textContent === correctAnswer) {
      b.classList.add('correct');
    }
  });

  if (isCorrect) {
    btn.classList.add('correct');
    document.getElementById('feedback').textContent = t().correct;
    document.getElementById('feedback').className = 'feedback correct';
    score += 2;
    document.getElementById('score-display').textContent = score;
  } else {
    btn.classList.add('wrong');
    document.getElementById('feedback').textContent = t().wrong(correctAnswer);
    document.getElementById('feedback').className = 'feedback wrong';
  }

  document.getElementById('hint-box').textContent = getHintText(currentItem);
  document.getElementById('hint-box').style.display = 'block';
  document.getElementById('next-btn').style.display = 'inline-block';
}

async function nextRound() {
  current++;
  if (current >= ROUNDS) {
    showEnd();
  } else {
    await loadNextRound();
  }
}

function showEnd() {
  document.getElementById('game').style.display = 'none';
  document.getElementById('endscreen').style.display = 'block';
  document.getElementById('final-score').textContent = score;

  const pct = score / (ROUNDS * 2);
  const messages = t().endMessages;
  const msg = pct >= 0.9 ? messages.master
    : pct >= 0.7 ? messages.impressive
    : pct >= 0.5 ? messages.decent
    : pct >= 0.3 ? messages.start
    : messages.everyone;

  document.getElementById('final-msg').textContent = msg;
}

startGame();
</script>
</body>
</html>
