<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Art Guesser</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #f5f0e8;
    --ink: #1a1510;
    --gold: #c9a84c;
    --rust: #8b3a2a;
    --muted: #7a6e5f;
    --card: #fffdf7;
    --border: #d9cfc0;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--cream);
    color: var(--ink);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  header {
    width: 100%;
    padding: 1.25rem 1rem 0.75rem;
    text-align: center;
    border-bottom: 1px solid var(--border);
  }

  .logo { font-family: 'Playfair Display', serif; font-size: clamp(1.6rem, 6vw, 2.8rem); letter-spacing: -0.02em; }
  .logo span { color: var(--gold); font-style: italic; }

  .tagline { font-size: 0.7rem; color: var(--muted); letter-spacing: 0.15em; text-transform: uppercase; margin-top: 0.15rem; }

  .score-bar { display: flex; gap: 1.25rem; justify-content: center; margin-top: 0.6rem; font-size: 0.75rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); }
  .score-bar strong { color: var(--ink); font-family: 'Playfair Display', serif; font-size: 1rem; }

  main { width: 100%; max-width: 680px; padding: 1.5rem 1rem 3rem; }

  #loading { display: flex; flex-direction: column; align-items: center; gap: 1rem; padding: 4rem 0; }

  .spinner { width: 32px; height: 32px; border: 2px solid var(--border); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.9s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text { font-size: 0.8rem; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; }

  .progress { display: flex; gap: 5px; margin-bottom: 1rem; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--border); transition: background 0.3s; }
  .dot.done { background: var(--gold); }
  .dot.current { background: var(--ink); }

  .round-label { font-size: 0.7rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.75rem; }

  .painting-frame {
    background: var(--ink);
    padding: 8px;
    border-radius: 2px;
    box-shadow: 6px 6px 0 var(--border);
    margin-bottom: 1.25rem;
    min-height: 180px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  .painting-frame img { width: 100%; max-height: 340px; object-fit: contain; display: block; background: #111; transition: opacity 0.4s; }

  .img-loader { position: absolute; display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .img-loader span { font-size: 11px; color: #888; letter-spacing: 0.1em; text-transform: uppercase; }

  .question { font-family: 'Playfair Display', serif; font-size: clamp(1rem, 3.5vw, 1.25rem); margin-bottom: 1rem; line-height: 1.4; transition: opacity 0.3s; }

  .options { display: grid; grid-template-columns: 1fr; gap: 0.6rem; margin-bottom: 1.25rem; transition: opacity 0.3s; }
  @media (min-width: 500px) { .options { grid-template-columns: 1fr 1fr; } }

  .option-btn {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 2px;
    padding: 0.85rem 1rem;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.88rem;
    color: var(--ink);
    cursor: pointer;
    text-align: left;
    line-height: 1.4;
    -webkit-tap-highlight-color: transparent;
    transition: border-color 0.15s, background 0.15s;
  }

  .option-btn:active:not(:disabled) { background: #fffbf0; }
  @media (hover: hover) { .option-btn:hover:not(:disabled) { border-color: var(--gold); background: #fffbf0; } }
  .option-btn.correct { background: #f0f7ec; border-color: #5a8a4a; color: #2d5a1e; }
  .option-btn.wrong { background: #fdf0ee; border-color: var(--rust); color: var(--rust); }
  .option-btn:disabled { cursor: default; }

  .feedback { font-family: 'Playfair Display', serif; font-size: 0.95rem; font-style: italic; margin-bottom: 1rem; min-height: 1.4rem; color: var(--muted); }
  .feedback.correct { color: #3d6b2e; }
  .feedback.wrong { color: var(--rust); }

  .hint-box { background: var(--card); border-left: 3px solid var(--gold); padding: 0.75rem 1rem; font-size: 0.82rem; color: var(--muted); line-height: 1.6; margin-bottom: 1rem; display: none; max-height: 110px; overflow-y: auto; }

  .bottom-row { display: flex; gap: 0.6rem; align-items: center; }

  .next-btn { background: var(--ink); color: var(--cream); border: none; border-radius: 2px; padding: 0.75rem 1.75rem; font-family: 'DM Sans', sans-serif; font-size: 0.88rem; cursor: pointer; display: none; -webkit-tap-highlight-color: transparent; }

  .hint-btn { background: transparent; border: 1.5px solid var(--border); border-radius: 2px; padding: 0.75rem 1rem; font-family: 'DM Sans', sans-serif; font-size: 0.82rem; color: var(--muted); cursor: pointer; -webkit-tap-highlight-color: transparent; }

  #endscreen { display: none; text-align: center; padding: 2.5rem 1rem; }
  .final-score { font-family: 'Playfair Display', serif; font-size: clamp(3rem, 15vw, 5.5rem); color: var(--gold); line-height: 1; margin-bottom: 0.4rem; }
  .final-label { font-size: 0.75rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); margin-bottom: 1.25rem; }
  .final-msg { font-family: 'Playfair Display', serif; font-size: 1.15rem; font-style: italic; margin-bottom: 1.75rem; }
  .restart-btn { background: var(--ink); color: var(--cream); border: none; border-radius: 2px; padding: 0.85rem 2.25rem; font-family: 'DM Sans', sans-serif; font-size: 0.9rem; cursor: pointer; }

  #game { display: none; }
  #error-msg { display: none; text-align: center; padding: 3rem; color: var(--rust); font-family: 'Playfair Display', serif; font-style: italic; }
</style>
</head>
<body>

<header>
  <div class="logo">Art <span>Guesser</span></div>
  <div class="tagline">Ken jij de grote meesters?</div>
  <div class="score-bar">
    <div>Score <strong id="score-display">0</strong></div>
    <div>Ronde <strong id="round-display">0</strong> / <strong id="total-display">10</strong></div>
  </div>
</header>

<main>
  <div id="loading">
    <div class="spinner"></div>
    <div class="loading-text" id="loading-text">Schilderij ophalen...</div>
  </div>

  <div id="game">
    <div class="round-label" id="round-label">Vraag 1 van 10</div>
    <div class="progress" id="progress"></div>

    <div class="painting-frame">
      <div class="img-loader" id="img-loader">
        <div class="spinner"></div>
        <span>Laden...</span>
      </div>
      <img id="painting-img" src="" alt="Schilderij" referrerpolicy="no-referrer" style="opacity:0;" />
    </div>

    <div class="question" id="question" style="opacity:0;"></div>
    <div class="options" id="options" style="opacity:0;"></div>
    <div class="feedback" id="feedback"></div>
    <div class="hint-box" id="hint-box"></div>
    <div class="bottom-row">
      <button class="hint-btn" id="hint-btn" onclick="showHint()">Hint</button>
      <button class="next-btn" id="next-btn" onclick="nextRound()">Volgende →</button>
    </div>
  </div>

  <div id="endscreen">
    <div class="final-score" id="final-score"></div>
    <div class="final-label">punten behaald</div>
    <div class="final-msg" id="final-msg"></div>
    <button class="restart-btn" onclick="startGame()">Opnieuw spelen</button>
  </div>

  <div id="error-msg">Kon schilderij niet ophalen. Controleer je internetverbinding en probeer opnieuw.</div>
</main>

<script>
const PAINTINGS = [
  "The Starry Night","Girl with a Pearl Earring","The Birth of Venus",
  "Mona Lisa","The Night Watch","The Persistence of Memory",
  "A Sunday on La Grande Jatte","The Scream","Las Meninas",
  "The Great Wave off Kanagawa","American Gothic","Guernica",
  "The Last Supper","Impression, Sunrise","The Garden of Earthly Delights",
  "Whistler's Mother","Café Terrace at Night","The Arnolfini Portrait",
  "Napoleon Crossing the Alps","The Swing (Fragonard)",
  "The Hay Wain","Sunflowers (Van Gogh)","Starry Night Over the Rhone",
  "Water Lilies (Monet series)","Self-Portrait with Thorn Necklace and Hummingbird"
];

const ROUNDS = 10;
const HEADERS = { "User-Agent": "ArtGuessingGame/1.0 (game@example.com)" };

let pool = [];
let cache = {};
let usedInGame = [];
let current = 0;
let score = 0;
let answered = false;
let hintUsed = false;
let currentItem = null;

async function fetchPainting(title) {
  if (cache[title]) return cache[title];
  const url = `https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(title.replace(/ /g,'_'))}`;
  try {
    const res = await fetch(url, { headers: HEADERS });
    if (!res.ok) return null;
    const data = await res.json();
    if (!data.thumbnail || !data.description) return null;
    const item = {
      title: data.title,
      description: data.description,
      extract: data.extract ? data.extract.slice(0, 400) + '…' : '',
      image: data.originalimage ? data.originalimage.source : data.thumbnail.source.replace(/\/\d+px-/, '/800px-'),
    };
    cache[title] = item;
    return item;
  } catch { return null; }
}

async function startGame() {
  score = 0;
  current = 0;
  answered = false;
  hintUsed = false;
  cache = {};
  usedInGame = [];
  pool = [...PAINTINGS].sort(() => Math.random() - 0.5);

  document.getElementById('score-display').textContent = 0;
  document.getElementById('round-display').textContent = 1;
  document.getElementById('total-display').textContent = ROUNDS;
  document.getElementById('endscreen').style.display = 'none';
  document.getElementById('error-msg').style.display = 'none';
  document.getElementById('game').style.display = 'none';
  document.getElementById('loading').style.display = 'flex';

  buildProgress();

  // Prefetch first 8 for fast wrong answers
  const prefetch = pool.slice(0, 8);
  await Promise.all(prefetch.map(t => fetchPainting(t).catch(() => null)));

  await loadNextRound();
}

async function loadNextRound() {
  document.getElementById('game').style.display = 'none';
  document.getElementById('loading').style.display = 'flex';
  document.getElementById('loading-text').textContent = 'Schilderij ophalen...';

  let item = null;
  while (!item && pool.length > 0) {
    const title = pool.shift();
    item = await fetchPainting(title);
  }

  if (!item) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error-msg').style.display = 'block';
    return;
  }

  usedInGame.push(item);
  currentItem = item;

  // Background prefetch next one
  if (pool.length > 0) fetchPainting(pool[0]).catch(() => null);

  showRound(item);
}

function buildProgress() {
  const el = document.getElementById('progress');
  el.innerHTML = '';
  for (let i = 0; i < ROUNDS; i++) {
    const dot = document.createElement('div');
    dot.className = 'dot' + (i === 0 ? ' current' : '');
    dot.id = `dot-${i}`;
    el.appendChild(dot);
  }
}

function updateProgress() {
  for (let i = 0; i < ROUNDS; i++) {
    const dot = document.getElementById(`dot-${i}`);
    if (!dot) continue;
    dot.className = 'dot' + (i < current ? ' done' : i === current ? ' current' : '');
  }
}

function showRound(item) {
  answered = false;
  hintUsed = false;

  document.getElementById('loading').style.display = 'none';
  document.getElementById('game').style.display = 'block';
  document.getElementById('round-label').textContent = `Vraag ${current + 1} van ${ROUNDS}`;
  document.getElementById('round-display').textContent = current + 1;
  document.getElementById('feedback').textContent = '';
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('hint-box').style.display = 'none';
  document.getElementById('next-btn').style.display = 'none';
  document.getElementById('hint-btn').disabled = false;

  const img = document.getElementById('painting-img');
  const loader = document.getElementById('img-loader');
  img.style.opacity = '0';
  document.getElementById('question').style.opacity = '0';
  document.getElementById('options').style.opacity = '0';
  loader.style.display = 'flex';

  const askPainter = current % 2 === 0;
  document.getElementById('question').textContent = askPainter
    ? 'Wie schilderde dit werk?'
    : 'Wat is de naam van dit schilderij?';

  // Build wrong options from cache
  const others = Object.values(cache).filter(d => d.title !== item.title).sort(() => Math.random() - 0.5).slice(0, 3);
  const choices = [item, ...others].sort(() => Math.random() - 0.5);

  const container = document.getElementById('options');
  container.innerHTML = '';
  choices.forEach(choice => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.textContent = askPainter ? choice.description : choice.title;
    btn.onclick = () => handleAnswer(btn, choice.title === item.title, askPainter, item);
    container.appendChild(btn);
  });

  updateProgress();

  img.onload = () => {
    loader.style.display = 'none';
    img.style.transition = 'opacity 0.4s';
    img.style.opacity = '1';
    document.getElementById('question').style.transition = 'opacity 0.3s';
    document.getElementById('question').style.opacity = '1';
    document.getElementById('options').style.transition = 'opacity 0.3s';
    document.getElementById('options').style.opacity = '1';
  };
  img.onerror = () => {
    loader.style.display = 'none';
    document.getElementById('question').style.opacity = '1';
    document.getElementById('options').style.opacity = '1';
  };
  img.src = '';
  img.src = item.image;
}

function handleAnswer(btn, isCorrect, askPainter, correct) {
  if (answered) return;
  answered = true;
  document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);
  document.getElementById('hint-btn').disabled = true;

  if (isCorrect) {
    btn.classList.add('correct');
    document.getElementById('feedback').textContent = hintUsed ? 'Correct!' : 'Correct! +2 bonus voor geen hint.';
    document.getElementById('feedback').className = 'feedback correct';
    score += hintUsed ? 1 : 2;
    document.getElementById('score-display').textContent = score;
  } else {
    btn.classList.add('wrong');
    const correctTxt = askPainter ? correct.description : correct.title;
    document.querySelectorAll('.option-btn').forEach(b => { if (b.textContent === correctTxt) b.classList.add('correct'); });
    document.getElementById('feedback').textContent = `Niet juist — het was: ${correctTxt}`;
    document.getElementById('feedback').className = 'feedback wrong';
  }

  document.getElementById('next-btn').style.display = 'inline-block';
}

function showHint() {
  if (answered || hintUsed || !currentItem) return;
  hintUsed = true;
  document.getElementById('hint-box').textContent = currentItem.extract || 'Geen hint beschikbaar.';
  document.getElementById('hint-box').style.display = 'block';
  document.getElementById('hint-btn').disabled = true;
}

async function nextRound() {
  current++;
  if (current >= ROUNDS) {
    showEnd();
  } else {
    await loadNextRound();
  }
}

function showEnd() {
  document.getElementById('game').style.display = 'none';
  document.getElementById('endscreen').style.display = 'block';
  document.getElementById('final-score').textContent = score;
  const pct = score / (ROUNDS * 2);
  let msg = pct >= 0.9 ? 'Meesterlijk! Je kent je kunst.'
    : pct >= 0.7 ? 'Indrukwekkend! Je hebt een scherp oog.'
    : pct >= 0.5 ? 'Niet slecht! Nog wat oefenen?'
    : pct >= 0.3 ? 'Een begin is er. Musea wachten op je!'
    : 'Kunst is voor iedereen — ook voor jou!';
  document.getElementById('final-msg').textContent = msg;
}

startGame();
</script>
</body>
</html>
